name: security

# Dependency vulnerability scanning + the security test suite (item 9/10).
# A vulnerable dependency (or a failing security test) fails the build.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend + pip-audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install . pip-audit
      - name: pip-audit (fail on known vulns)
        working-directory: backend
        run: pip-audit --strict --progress-spinner=off

  node-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (fail on high/critical)
        working-directory: frontend
        run: |
          npm ci || npm install
          npm audit --audit-level=high

  security-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend (dev)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Run the security test suite
        working-directory: backend
        env:
          LLM_PROVIDER: local
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: python -m pytest tests/test_security_auth.py tests/test_security_idor.py tests/test_security_input.py tests/test_security_headers.py tests/test_security_injection.py -q
